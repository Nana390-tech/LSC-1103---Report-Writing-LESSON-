!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Writing Pro | LSC 1103</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#FDF6EE;color:#2C2C2C}
#app{display:flex;min-height:100vh}
#sb{width:245px;background:linear-gradient(170deg,#C8562E,#8E3018);color:#fff;position:fixed;height:100vh;overflow-y:auto;flex-shrink:0}
#sbh{padding:15px;border-bottom:1px solid rgba(255,255,255,.2)}
#sbh h1{font-size:.93rem;font-weight:800}#sbh p{font-size:.69rem;opacity:.78;margin-top:2px}
.pbw{margin-top:9px;background:rgba(255,255,255,.2);border-radius:8px;height:5px}
#pf{height:5px;border-radius:8px;background:#F0B840;width:0%;transition:width .4s}
#pt{font-size:.69rem;opacity:.75;margin-top:3px;display:block}
#nl{padding:7px 0}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;background:none;border:none;color:#fff;text-align:left;cursor:pointer;font-size:.79rem;transition:background .2s}
.nb:hover{background:rgba(255,255,255,.1)}.nb.act{background:rgba(255,255,255,.18);font-weight:700}.nb.dn .ni{background:#4A9660}
.ni{width:23px;height:23px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:.71rem;font-weight:700;flex-shrink:0}
#main{margin-left:245px;padding:25px 30px;flex:1;max-width:900px}
.mod{display:none}.mod.active{display:block}
.mh{margin-bottom:20px}.mh h2{font-size:1.4rem;font-weight:800;color:#C8562E}.mh p{color:#666;margin-top:4px;font-size:.87rem}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:15px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card h3{font-size:.96rem;color:#C8562E;margin-bottom:11px;font-weight:700}
.ib{border-left:4px solid #C8562E;border-radius:0 8px 8px 0;padding:11px 14px;margin:8px 0;font-size:.84rem;line-height:1.7;background:#FFF0E6}
.ib.b{background:#EBF3FA;border-color:#4E7FAC}.ib.g{background:#E8F5EE;border-color:#4A9660}.ib.a{background:#FFF6E0;border-color:#DDA020}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .2s}
.bp{background:#C8562E;color:#fff}.bp:hover{background:#A03820}
.bs{background:#4E7FAC;color:#fff}.bs:hover{background:#35608A}
.bg{background:#4A9660;color:#fff}.bg:hover{background:#326A44}
.bo{background:transparent;border:2px solid #C8562E;color:#C8562E}.bo:hover{background:#C8562E;color:#fff}
.opt{background:#fff;border:2px solid #DDD;border-radius:8px;padding:8px 12px;cursor:pointer;transition:all .2s;font-size:.84rem;margin-bottom:5px}
.opt:hover{border-color:#C8562E;background:#FFF0E6}.opt.c{border-color:#4A9660;background:#E8F5EE;color:#1A5030}
.opt.w{border-color:#B03030;background:#FDE8E8;color:#B03030}.opt.s{border-color:#C8562E;background:#FFF0E6}
.fb{margin-top:8px;padding:9px 12px;border-radius:8px;font-size:.82rem;font-weight:600}
.fb.c{background:#E8F5EE;color:#1A5030}.fb.w{background:#FDE8E8;color:#B03030}
.act{background:#FFFAF2;border:2px dashed #E8C888;border-radius:12px;padding:15px;margin:11px 0}
.nr{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:10px}
.tmpl{background:#EEF3F8;border-radius:10px;padding:14px;font-size:.85rem;line-height:1.85;border:1px solid #C0CFE0;font-style:italic}
.tmpl b{background:#EBF3FA;border-bottom:2px solid #4E7FAC;padding:0 4px;border-radius:3px;font-style:normal;color:#1A4A7A}
.irow{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:10px;background:#FFF0E6;border-left:4px solid #C8562E;margin-bottom:6px;font-size:.85rem}
.irow.b{background:#EBF3FA;border-color:#4E7FAC}.irow.g{background:#E8F5EE;border-color:#4A9660}.irow.a{background:#FFF6E0;border-color:#DDA020}
.inum{font-size:.98rem;font-weight:800;color:#C8562E;min-width:24px}.inum.b{color:#4E7FAC}.inum.g{color:#4A9660}.inum.a{color:#DDA020}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin:11px 0}
.tc{border-radius:12px;padding:13px;text-align:center;border:2px solid transparent;font-size:.81rem}
.tc.i{background:#EBF3FA;border-color:#4E7FAC}.tc.p{background:#FFF0E6;border-color:#C8562E}.tc.e{background:#E8F5EE;border-color:#4A9660}
.tc em{font-size:1.6rem;display:block;margin-bottom:5px}.tc h4{font-size:.85rem;margin-bottom:4px;font-weight:700}
.vword{background:#C8562E;color:#fff;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:700;text-align:center;margin-bottom:5px;transition:all .2s}
.vword:hover{background:#A03820}.vword.s{background:#A03820}.vword.m{background:#4A9660;cursor:default}
.vdef{border:2px solid #DDD;padding:7px 12px;border-radius:8px;cursor:pointer;font-size:.81rem;margin-bottom:5px;background:#fff;transition:all .2s}
.vdef:hover{border-color:#C8562E;background:#FFF0E6}.vdef.s{border-color:#C8562E;background:#FFF0E6}.vdef.m{border-color:#4A9660;background:#E8F5EE;cursor:default}
.si{background:#fff;border:2px solid #C0CFE0;border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:.82rem;line-height:1.45}
.si.ok{border-color:#4A9660;background:#E8F5EE}.si.no{border-color:#B03030;background:#FDE8E8}
.cli{display:flex;align-items:center;gap:7px;font-size:.81rem;padding:5px 9px;border-radius:6px;margin-bottom:4px}
.cli.p{background:#E8F5EE;color:#1A5030}.cli.f{background:#FDE8E8;color:#B03030}.cli.n{background:#F4F4F4;color:#555}
.tmr{font-size:1.8rem;font-weight:800;color:#C8562E;padding:8px 15px;background:#FFF0E6;border-radius:10px;letter-spacing:1px}
.tmr.w{color:#B03030;background:#FDE8E8;animation:pl 1s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.6}}
.scn{background:linear-gradient(135deg,#FFF3E8,#FFFAF0);border:2px solid #E0C898;border-radius:12px;padding:15px;margin:11px 0}
.scn h4{color:#A03820;margin-bottom:7px;font-size:.82rem;text-transform:uppercase;letter-spacing:.4px}.scn p{font-size:.85rem;line-height:1.6}
.pb{background:#F3F3F3;border-radius:10px;padding:11px;margin:9px 0}
.pb h5{font-size:.79rem;color:#555;margin-bottom:6px;font-weight:700}.ptags{display:flex;flex-wrap:wrap;gap:5px}
.pt{background:#fff;border:1px solid #C0CFE0;border-radius:14px;padding:3px 10px;font-size:.76rem}
.wt{display:inline-block;padding:3px 9px;border-radius:12px;font-size:.71rem;font-weight:700;margin:2px}
.wt.a{background:#EBF3FA;color:#1E4E7A;border:1px solid #4E7FAC}.wt.b{background:#FFF0E6;color:#8E2A0E;border:1px solid #C8562E}
.wt.c{background:#E8F5EE;color:#1A5E30;border:1px solid #4A9660}.wt.d{background:#FFF6E0;color:#7A5200;border:1px solid #DDA020}.wt.e{background:#F2EBF8;color:#4A1E7A;border:1px solid #8E5ABE}
.ma{display:none;background:#EBF3FA;border-radius:10px;padding:13px;margin-top:10px;border:1px solid #4E7FAC;font-size:.85rem;line-height:1.75}
.ma.v{display:block}.ma.prb{background:#FFF0E6;border-color:#C8562E}.ma.evl{background:#E8F5EE;border-color:#4A9660}
.sbar{display:flex;gap:7px;justify-content:flex-end;margin-bottom:12px}
.wa{width:100%;min-height:160px;border:2px solid #C0CFE0;border-radius:10px;padding:12px;font-size:.86rem;line-height:1.6;resize:vertical;font-family:inherit}
.wa:focus{outline:none;border-color:#C8562E}
.wcd{font-size:.79rem;color:#888;margin-top:4px}.wcd span{font-weight:700;color:#C8562E}
.h1{background:#EBF3FA;color:#1E4E7A;padding:1px 4px;border-radius:3px;font-weight:700}
.h2{background:#FFF0E6;color:#8E2A0E;padding:1px 4px;border-radius:3px;font-weight:700}
.h3{background:#E8F5EE;color:#1A5E30;padding:1px 4px;border-radius:3px;font-weight:700}
.h4c{background:#FFF6E0;color:#7A5200;padding:1px 4px;border-radius:3px;font-weight:700}
.h5{background:#F2EBF8;color:#4A1E7A;padding:1px 4px;border-radius:3px;font-weight:700}
select{padding:5px 8px;border-radius:6px;border:2px solid #C0CFE0;font-size:.82rem;font-family:inherit}
select:focus{outline:none;border-color:#C8562E}
.c2g{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.cw{background:#fff;border-radius:12px;padding:13px;border:1px solid #DDD}
.vg3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:9px}
@media(max-width:720px){#sb{width:100%;height:auto;position:relative}#main{margin-left:0;padding:15px}#app{flex-direction:column}.tgrid,.c2g{grid-template-columns:1fr}}
.fpb{position:fixed;bottom:22px;right:22px;z-index:200;background:#C8562E;color:#fff;border:none;border-radius:50px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:.83rem;box-shadow:0 4px 14px rgba(200,86,46,.35);transition:all .2s}.fpb:hover{background:#A03820;transform:translateY(-2px)}
@media print{#sb,#sb *,.sbar,.nr,.fpb,button,select{display:none!important}.mod{display:none!important}.mod.active{display:block!important}#main{margin:0!important;padding:10px!important;max-width:100%!important}body{background:#fff!important}.card{box-shadow:none!important;border:1px solid #CCC!important;break-inside:avoid;margin-bottom:12px!important}.act{border:1px solid #CCC!important}.ib,.irow,.scn{break-inside:avoid}}
</style>
</head>
<body>
<div id="app">
<nav id="sb">
  <div id="sbh">
    <h1>📋 Report Writing Pro</h1>
    <p>LSC 1103 | Professional Report Skills</p>
    <div class="pbw"><div id="pf"></div></div>
    <span id="pt">0 / 9 modules</span>
  </div>
  <div id="nl"></div>
</nav>
<main id="main">
  <div class="sbar">
    <button class="btn bo" style="font-size:.75rem;padding:5px 10px" onclick="saveP()">💾 Save</button>
    <button class="btn bo" style="font-size:.75rem;padding:5px 10px" onclick="loadP()">📂 Load</button>
  </div>
  <div id="mod-1" class="mod active"></div>
  <div id="mod-2" class="mod"></div>
  <div id="mod-3" class="mod"></div>
  <div id="mod-4" class="mod"></div>
  <div id="mod-5" class="mod"></div>
  <div id="mod-6" class="mod"></div>
  <div id="mod-7" class="mod"></div>
  <div id="mod-8" class="mod"></div>
  <div id="mod-9" class="mod"></div>
  <div id="mod-10" class="mod"></div>
  <button class="fpb" onclick="window.print()" title="Print this section">🖨️ Print Section</button>
  <div style="margin-top:28px;padding:12px 16px;background:white;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);text-align:center;font-size:.8rem;color:#999">✏️ Created by <strong style="color:#C8562E">Nazila Motahari</strong> &nbsp;|&nbsp; LSC 1103 | Higher Colleges of Technology</div>
</main>
</div>
<script>
const S={cur:1,done:new Set(),exam:{sc:null,iv:null,secs:4500}};
const MODS=[{id:1,icon:'📋',name:'What is a Report?'},{id:2,icon:'🎯',name:'Choosing Report Type'},{id:3,icon:'🏷️',name:'Writing Titles'},{id:4,icon:'📝',name:'The Introduction'},{id:5,icon:'📊',name:'Reading Charts'},{id:6,icon:'🔬',name:'Findings & Analysis'},{id:7,icon:'✅',name:'Conclusion & Recs'},{id:8,icon:'📚',name:'Vocabulary'},{id:9,icon:'🏆',name:'Full Exam Practice'},{id:10,icon:'📖',name:'Final Review'}];

function buildNav(){
  document.getElementById('nl').innerHTML=MODS.map(m=>`<button class="nb ${m.id===1?'act':''}" id="nb${m.id}" onclick="goM(${m.id})"><div class="ni" id="ni${m.id}">${m.id}</div><div style="font-size:.77rem;line-height:1.25">${m.icon} ${m.name}</div></button>`).join('');
}
function goM(id){
  S.done.add(S.cur);S.cur=id;
  document.querySelectorAll('.mod').forEach(e=>e.classList.remove('active'));
  document.getElementById('mod-'+id).classList.add('active');
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('act'));
  const nb=document.getElementById('nb'+id);if(nb)nb.classList.add('act');
  updP();window.scrollTo({top:0,behavior:'smooth'});
}
function updP(){
  const d=S.done.size;
  document.getElementById('pf').style.width=(d/9*100)+'%';
  document.getElementById('pt').textContent=`${d} / 9 modules`;
  S.done.forEach(id=>{const ni=document.getElementById('ni'+id);if(ni)ni.textContent='✓';const nb=document.getElementById('nb'+id);if(nb)nb.classList.add('dn');});
}
function wc(t){return t.trim()===''?0:t.trim().split(/\s+/).length;}
function nav(p,n){return `<div class="nr">${p?`<button class="btn bo" onclick="goM(${p})">← Previous</button>`:'<div></div>'}${n?`<button class="btn bp" onclick="goM(${n})">Next →</button>`:'<div></div>'}</div>`;}
function fb(id,msg,ok){const el=document.getElementById(id);if(el)el.innerHTML=`<div class="fb ${ok?'c':'w'}">${msg}</div>`;}

// ===== MODULE 1 =====
function buildM1(){
  const q=[
    {q:"Which best describes a professional report?",o:["A personal essay sharing your opinion","A formal document presenting findings and recommendations","A creative story about a workplace situation","An informal message to a colleague"],c:1},
    {q:"What is the main difference between a report and an essay?",o:["Reports are always shorter","Essays use formal language; reports do not","Reports are based on evidence; essays share opinions","There is no real difference"],c:2},
    {q:"Which word does NOT describe a professional report?",o:["Objective","Emotional","Organized","Formal"],c:1}
  ];
  document.getElementById('mod-1').innerHTML=`
  <div class="mh"><h2>📋 Module 1: What is a Professional Report?</h2><p>Understand the purpose, characteristics, and structure of professional reports.</p></div>
  <div class="card"><h3>Definition & Purpose</h3>
    <p style="font-size:.86rem;line-height:1.7;margin-bottom:11px">A professional report is a formal document used in business or workplace settings. It helps solve problems, collect information, or evaluate outcomes — <strong>not</strong> share personal opinions.</p>
    <div class="ib"><strong>Key characteristics:</strong><ul style="margin-top:6px;padding-left:17px;line-height:1.9"><li><strong>Formal</strong> – professional language, no casual or emotional tone</li><li><strong>Organized</strong> – clear sections with logical structure</li><li><strong>Focused</strong> – addresses a specific issue</li><li><strong>Objective</strong> – based on facts and data, not personal feelings</li></ul></div>
    <div class="ib b" style="margin-top:8px">⚠️ <strong>A report is NOT an essay!</strong> Essays share opinions. Reports present evidence, findings, and practical recommendations.</div>
  </div>
  <div class="card"><h3>The Exam Report Structure</h3>
    <p style="font-size:.85rem;color:#666;margin-bottom:11px">You receive a scenario + two charts. Write this exact structure:</p>
    <div class="irow"><span class="inum">🏷️</span><div><strong>Title</strong> — clearly describes what the report is about</div></div>
    <div class="irow b"><span class="inum b">📝</span><div><strong>Introduction</strong> — 2–3 sentences, ~50 words</div></div>
    <div class="irow g"><span class="inum g">📊</span><div><strong>Findings & Analysis</strong> — 5 sentences referencing both charts</div></div>
    <div class="irow a"><span class="inum a">✅</span><div><strong>Conclusion & Recommendations</strong> — summarize + justify actions with data</div></div>
    <div class="ib a" style="margin-top:10px">🎯 Target: <strong>~250 words</strong> &nbsp;|&nbsp; ⏱️ Exam time: <strong>75 minutes</strong></div>
  </div>
  <div class="card"><h3>The Three Report Types</h3>
    <div class="tgrid">
      <div class="tc i"><em>🔍</em><h4>Informative</h4><p>Analyzes or determines something. Presents facts to understand a topic.</p><p style="margin-top:6px;font-size:.75rem;font-weight:700;color:#1E4E7A">Verbs: analyze, determine, identify</p></div>
      <div class="tc p"><em>⚠️</em><h4>Problem-Solving</h4><p>Addresses a challenge and proposes solutions to fix or improve it.</p><p style="margin-top:6px;font-size:.75rem;font-weight:700;color:#8E2A0E">Verbs: address, solve, propose</p></div>
      <div class="tc e"><em>⚖️</em><h4>Evaluation</h4><p>Compares or assesses options, programs, or outcomes to recommend the best.</p><p style="margin-top:6px;font-size:.75rem;font-weight:700;color:#1A5E30">Verbs: compare, evaluate, assess</p></div>
    </div>
  </div>
  <div class="card"><h3>🎯 Activity: Check Your Understanding</h3>
    <div class="act">${q.map((item,i)=>`<div style="margin-bottom:14px"><p style="font-weight:700;font-size:.86rem;margin-bottom:8px">${i+1}. ${item.q}</p>${item.o.map((o,j)=>`<div class="opt" id="m1o${i}${j}" onclick="selM1(${i},${j})">${'ABCD'[j]}. ${o}</div>`).join('')}</div>`).join('')}</div>
    <button class="btn bp" onclick="chkM1()">Check Answers</button><div id="m1fb"></div>
  </div>${nav(null,2)}`;
  window._m1={q,sel:{}};
}
function selM1(i,j){window._m1.sel[i]=j;for(let k=0;k<4;k++){const el=document.getElementById(`m1o${i}${k}`);if(el)el.className='opt'+(k===j?' s':'');}}
function chkM1(){let sc=0;window._m1.q.forEach((item,i)=>{for(let j=0;j<item.o.length;j++){const el=document.getElementById(`m1o${i}${j}`);if(el)el.className='opt'+(j===item.c?' c':j===window._m1.sel[i]&&j!==item.c?' w':'');}if(window._m1.sel[i]===item.c)sc++;});if(sc===window._m1.q.length){fb('m1fb','🎉 Perfect! You understand the basics of professional reports.',true);S.done.add(1);updP();}else fb('m1fb',`Score: ${sc}/${window._m1.q.length}. Review correct answers (green).`,false);}

// ===== MODULE 2 =====
const M2SC=[
  {t:"The HR Manager at Emirates Group asked for a report to study employee satisfaction levels, based on a survey of 300 staff in 2024.",a:"inf"},
  {t:"The Principal noticed a sharp rise in student absenteeism and needs a report that identifies the causes and suggests actions to reduce absence rates.",a:"prob"},
  {t:"The Training Manager wants to compare two professional development programs from 2023 and 2024, to decide which one continues next year.",a:"eval"},
  {t:"The Operations Manager requested a report to analyze customer complaint patterns at a retail company, based on six months of data.",a:"inf"}
];
let _m2sel={};
function buildM2(){
  document.getElementById('mod-2').innerHTML=`
  <div class="mh"><h2>🎯 Module 2: Choosing the Report Type</h2><p>Practice identifying the correct report type from workplace scenarios.</p></div>
  <div class="card"><h3>How to Identify the Report Type</h3>
    <div class="ib b">🔍 <strong>Informative?</strong> → Analyze data, determine patterns, identify facts about a topic.</div>
    <div class="ib">⚠️ <strong>Problem-Solving?</strong> → A problem exists; suggest solutions to fix it.</div>
    <div class="ib g">⚖️ <strong>Evaluation?</strong> → Compare two or more options, programs, or outcomes.</div>
  </div>
  <div class="card"><h3>🎯 Activity: Classify the Scenarios</h3>
    <p style="font-size:.85rem;color:#555;margin-bottom:12px">Read each scenario. Select the correct report type.</p>
    <div id="m2sc">${M2SC.map((s,i)=>`<div style="background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;border:1px solid #E0D0C0"><p style="font-size:.85rem;line-height:1.6;margin-bottom:9px"><strong>${i+1}.</strong> ${s.t}</p><div style="display:flex;gap:6px;flex-wrap:wrap">${[['inf','🔍 Informative','bs'],['prob','⚠️ Problem-Solving','bp'],['eval','⚖️ Evaluation','bg']].map(([k,l,c])=>`<button class="btn ${c}" id="s2${i}${k}" onclick="selM2(${i},'${k}')" style="font-size:.77rem;padding:5px 10px">${l}</button>`).join('')}</div></div>`).join('')}</div>
    <button class="btn bp" onclick="chkM2()" style="margin-top:11px">Check All Answers</button>
    <div id="m2fb" style="margin-top:8px"></div>
  </div>${nav(1,3)}`;
  _m2sel={};
}
function selM2(i,k){_m2sel[i]=k;['inf','prob','eval'].forEach(t=>{const el=document.getElementById(`s2${i}${t}`);if(el)el.style.opacity=t===k?'1':'0.5';});}
function chkM2(){let sc=0;M2SC.forEach((s,i)=>{['inf','prob','eval'].forEach(t=>{const el=document.getElementById(`s2${i}${t}`);if(!el)return;el.style.opacity='1';el.style.outline=t===s.a?'3px solid #4A9660':t===_m2sel[i]&&t!==s.a?'3px solid #B03030':'none';});if(_m2sel[i]===s.a)sc++;});if(sc===M2SC.length){fb('m2fb','🎉 Excellent! You can identify all three report types.',true);S.done.add(2);updP();}else fb('m2fb',`Score: ${sc}/${M2SC.length}. Correct answers highlighted in green.`,false);}

// ===== MODULE 3 =====
function buildM3(){
  document.getElementById('mod-3').innerHTML=`
  <div class="mh"><h2>🏷️ Module 3: Writing Report Titles</h2><p>Master the title formula using 5W+1H — including WHY.</p></div>
  <div class="card"><h3>The Title Formula</h3>
    <div style="text-align:center;background:linear-gradient(135deg,#FFF0E6,#FFFAF0);border-radius:12px;padding:15px;margin-bottom:12px;border:2px solid #E0C898"><p style="font-size:1.04rem;font-weight:800;color:#A03820">Type of Report + Purpose of Report + Details (5W+1H)</p><p style="font-size:.79rem;color:#666;margin-top:4px">Usually 10–20 words long</p></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin:10px 0">

function selExSc(id){_exSc=id;EXSC.forEach(s=>{const el=document.getElementById('exscb'+s.id);if(!el)return;el.style.borderColor=s.id===id?'#C8562E':'#E0D0C0';el.style.background=s.id===id?'#FFF0E6':'#fff';const rb=el.querySelector('input');if(rb)rb.checked=s.id===id;});}
function startExam(){const sc=EXSC.find(s=>s.id===_exSc);if(!sc)return;S.exam.sc=sc;S.exam.secs=4500;document.getElementById('exsetup').style.display='none';document.getElementById('exactive').style.display='block';document.getElementById('exscn').innerHTML=`<h4>📋 Your Task</h4><p>${sc.text}</p><p style="margin-top:7px;font-weight:700;color:#A03820;font-size:.83rem">Write a complete report. Target ~250 words. Reference both charts explicitly.</p>`;document.getElementById('exc1').innerHTML=drawChart(sc.c1);document.getElementById('exc2').innerHTML=drawChart(sc.c2);updTmr();S.exam.iv=setInterval(()=>{S.exam.secs--;updTmr();if(S.exam.secs<=0)endExam();},1000);initChk();}
function drawChart(ch){
  if(ch.type==='bar'){const mx=Math.max(...ch.data.map(d=>d.v));const bw=Math.floor(300/ch.data.length)-7;const H=125;const bars=ch.data.map((d,i)=>{const h=Math.round(d.v/(mx*1.2)*H);const x=36+i*(bw+7);const y=22+H-h;const l=d.l.length>9?d.l.slice(0,9)+'…':d.l;return `<rect x="${x}" y="${y}" width="${bw}" height="${h}" fill="${d.c}" rx="3"/><text x="${x+bw/2}" y="${y-3}" text-anchor="middle" font-size="8" font-weight="bold" fill="${d.c}">${d.v}%</text><text x="${x+bw/2}" y="${22+H+13}" text-anchor="middle" font-size="7.5" fill="#555">${l}</text>`;}).join('');return `<p style="font-size:.76rem;font-weight:700;color:#333;margin-bottom:6px">${ch.title}</p><svg viewBox="0 0 350 ${22+H+22}" style="width:100%"><line x1="33" y1="${22+H}" x2="345" y2="${22+H}" stroke="#CCC"/>${bars}</svg>`;}
  else{const tot=ch.data.reduce((s,d)=>s+d.v,0);let ang=-90;const cx=75,cy=80,r=60;const slices=ch.data.map(d=>{const a=d.v/tot*360;const r1=ang*Math.PI/180,r2=(ang+a)*Math.PI/180;const x1=cx+r*Math.cos(r1),y1=cy+r*Math.sin(r1),x2=cx+r*Math.cos(r2),y2=cy+r*Math.sin(r2);const lrg=a>180?1:0;const mx2=cx+r*.6*Math.cos((ang+a/2)*Math.PI/180),my=cy+r*.6*Math.sin((ang+a/2)*Math.PI/180);ang+=a;return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lrg},1 ${x2},${y2} Z" fill="${d.c}"/><text x="${mx2}" y="${my}" text-anchor="middle" font-size="8" font-weight="bold" fill="white">${d.v}%</text>`;}).join('');const leg=ch.data.map((d,i)=>`<rect x="150" y="${16+i*18}" width="10" height="10" fill="${d.c}" rx="2"/><text x="164" y="${25+i*18}" font-size="8.5" fill="#333">${d.l} (${d.v}%)</text>`).join('');return `<p style="font-size:.76rem;font-weight:700;color:#333;margin-bottom:6px">${ch.title}</p><svg viewBox="0 0 350 165" style="width:100%">${slices}${leg}</svg>`;}
}
function updTmr(){const s=S.exam.secs,m=Math.floor(s/60),sec=s%60;const el=document.getElementById('tmrdsp');if(!el)return;el.textContent=`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;el.className='tmr'+(s<300?' w':'');}
function initChk(){const c=document.getElementById('exchk');if(!c)return;c.innerHTML=EXCK.map(item=>`<div class="cli n" id="cl${item.id}"><span>⬜</span> ${item.l}</div>`).join('');}
function updExam(){const text=document.getElementById('exta')?.value||'';const count=wc(text);['exwc','exwcbig'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=count;});EXCK.forEach(item=>{const el=document.getElementById('cl'+item.id);if(!el)return;const pass=item.fn(text);el.className='cli '+(pass?'p':'n');el.firstChild.textContent=pass?'✅':'⬜';});}
function endExam(){if(S.exam.iv){clearInterval(S.exam.iv);S.exam.iv=null;}const text=document.getElementById('exta')?.value||'';const count=wc(text);const passed=EXCK.filter(item=>item.fn(text)).length;document.getElementById('exactive').style.display='none';const res=document.getElementById('exres');if(!res)return;res.style.display='block';const grade=passed>=9?'Excellent 🌟':passed>=7?'Good 👍':passed>=5?'Developing 📈':'Needs Work 🔧';const gc=passed>=9?'#4A9660':passed>=7?'#4E7FAC':passed>=5?'#DDA020':'#B03030';const tips=[!EXCK[0].fn(text)&&'Make sure your title is on its own line at the top.',(!EXCK[4].fn(text)||!EXCK[5].fn(text))&&'Reference both Chart 1 and Chart 2 explicitly in your findings.',!EXCK[7].fn(text)&&'Include at least one recommendation using "It is recommended that..."',!EXCK[8].fn(text)&&'Justify recommendations with data ("because the findings show that...").',count<200&&`Expand your report — you wrote ${count} words. Aim for 250.`].filter(Boolean);res.innerHTML=`<div class="card"><div style="text-align:center;margin-bottom:16px"><div style="font-size:2.4rem">🏆</div><h3 style="font-size:1.25rem;color:${gc};margin:6px 0">${grade}</h3><p style="font-size:.85rem;color:#555">Checklist: ${passed}/${EXCK.length} | Words: ${count}</p></div>${EXCK.map(item=>`<div class="cli ${item.fn(text)?'p':'f'}"><span>${item.fn(text)?'✅':'❌'}</span>${item.l}</div>`).join('')}${tips.length?`<div class="ib" style="margin-top:12px"><strong>Tips to improve:</strong><ul style="padding-left:16px;margin-top:6px;font-size:.83rem;line-height:1.85">${tips.map(t=>`<li>${t}</li>`).join('')}</ul></div>`:'<div class="ib g" style="margin-top:12px">All key elements present! Focus on making your language even more formal and precise.</div>'}<div style="display:flex;gap:8px;margin-top:13px"><button class="btn bp" onclick="resetExam()">Try Another Scenario</button><button class="btn bo" onclick="saveP()">💾 Save Progress</button></div></div>`;S.done.add(9);updP();}
function resetExam(){document.getElementById('exres').style.display='none';document.getElementById('exsetup').style.display='block';const ta=document.getElementById('exta');if(ta)ta.value='';initChk();}

// ===== SAVE / LOAD =====
function saveP(){const data={done:[...S.done],m7:document.getElementById('m7wa')?.value||'',exam:document.getElementById('exta')?.value||'',ts:new Date().toISOString()};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download='report_writing_progress.json';a.click();}
function loadP(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.done){S.done=new Set(d.done.map(Number));updP();}if(d.m7){const el=document.getElementById('m7wa');if(el)el.value=d.m7;}if(d.exam){const el=document.getElementById('exta');if(el)el.value=d.exam;}alert('Progress loaded!');}catch{alert('Error loading file.');}};r.readAsText(f);};inp.click();}
